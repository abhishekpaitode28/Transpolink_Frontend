<mat-sidenav-container class="tl-sidenav-container">

  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="side" [opened]="sidenavOpened" class="tl-sidenav">
    <tl-sidebar />
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content class="tl-sidenav-content">
    <tl-topbar (menuToggle)="toggleSidenav()" />
    <div class="tl-page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>

<tl-toast />
